 <!-- 第一步：确保 data.js 在逻辑脚本之前加载 -->
<script src="data.js"></script>

<script>
    // 初始化配置
    let currentIndex = 8;
    const increment = 8;
    let currentFilteredPosts = []; 

    // 渲染文章列表函数
    function renderArticles(isAppend = false) {
      const container = document.querySelector('.article-grid');
      const loadMoreBtn = document.getElementById('load-more-container');
      if (!container) return;

      if (!isAppend) {
        container.innerHTML = "";
        currentIndex = 8;
      }

      const itemsToShow = currentFilteredPosts.slice(isAppend ? currentIndex - increment : 0, currentIndex);

      const html = itemsToShow.map(post => {
        // --- 核心修复逻辑 ---
        let previewText = "";
        
        // 优先使用我们在 data.js 中定义的简洁 summary，如果没有则使用 description
        if (post.summary) {
            previewText = post.summary;
        } else if (post.description && post.description.includes('<div')) {
            previewText = "德国号码 + 德国原生流量 + 德区应用环境，国行手机数字出海全链路实操方案实测。";
        } else {
            previewText = post.description || "暂无简介";
        }
        // --------------------

        // 在最外层包裹 <a> 标签，并添加 target="_blank"
        return `
        <a href="details.html?id=${post.youtubeId}" target="_blank" style="text-decoration: none; color: inherit; display: block;">
          <article class="card p-4 flex flex-col gap-3">
            <div class="flex items-center gap-2">
              <span class="tag">${post.category}</span>
              <span class="text-dim uppercase text-[12px] font-mono">${post.date}</span>
            </div>
            <div class="flex-1">
              <h3 class="font-display font-semibold text-text mb-2 text-[18px] leading-snug">${post.title}</h3>
              <p class="text-dim text-[15px] line-clamp-2">${previewText}</p>
            </div>
            <div class="iframe-wrap mb-2">
              <!-- 注意：iframe 内部点击不会触发外层的 a 标签跳转，这符合用户看视频的习惯 -->
              <iframe src="https://www.youtube.com/embed/${post.youtubeId}" allowfullscreen></iframe>
            </div>
            <div class="flex items-center justify-between">
              <div class="flex gap-1.5 flex-wrap">
                ${post.tags ? post.tags.map(tag => `<span class="tag" style="background:rgba(108,182,255,0.05);">${tag}</span>`).join('') : ''}
              </div>
              
              <div class="arrow-btn" title="查看视频说明">
                <i class="fas fa-arrow-right"></i>
              </div>
            </div>
          </article>
        </a>
      `}).join('');

      container.insertAdjacentHTML('beforeend', html);

      // 控制加载更多按钮显隐
      if (loadMoreBtn) {
        loadMoreBtn.style.display = (currentIndex >= currentFilteredPosts.length) ? 'none' : 'flex';
      }
    }

    // 渲染右侧热门文章
    function renderHotPosts() {
      const hotContainer = document.getElementById('hot-posts-container');
      if (!hotContainer || typeof posts === 'undefined') return;
      
      hotContainer.innerHTML = posts.slice(0, 4).map((post, i) => `
        <div class="flex gap-3 items-start group cursor-pointer" onclick="window.location.href='details.html?id=${post.youtubeId}'">
          <span class="font-display text-accentDim group-hover:text-accent shrink-0 text-[22px] leading-none mt-[1px]">0${i+1}</span>
          <span class="text-dim group-hover:text-text text-[15px] leading-snug line-clamp-2">${post.title}</span>
        </div>
      `).join('');
    }

    // 页面加载后的主逻辑
    document.addEventListener('DOMContentLoaded', () => {
      // 检查 data.js 数据是否成功加载
      if (typeof posts !== 'undefined' && Array.isArray(posts)) {
        currentFilteredPosts = [...posts];
        renderArticles();
        renderHotPosts();
      } else {
        console.error("data.js 加载失败或格式错误");
      }

      // 绑定加载更多事件
      document.getElementById('load-more-btn')?.addEventListener('click', () => {
        currentIndex += increment;
        renderArticles(true);
      });
      
      // 绑定分类过滤点击事件
      document.querySelectorAll('.nav-filter').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          // 兼容 <a> 标签和 <div> 分类项的文字提取
          let cat = link.tagName === 'A' ? link.innerText.trim() : (link.querySelector('span')?.innerText.trim() || "");
          let filterCat = (cat === "港美股/加密货币") ? "港美股&加密货币" : cat;

          // 执行过滤
          currentFilteredPosts = (filterCat === '首页' || filterCat === '小帆船' || !filterCat) ? [...posts] : posts.filter(p => p.category === filterCat);
          renderArticles(false);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });
    });
</script>

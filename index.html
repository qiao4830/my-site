    function renderArticles(data) {
      const container = document.querySelector('.article-grid');
      if (!container) return;
      container.innerHTML = data.map(post => `
        <article class="card p-4 flex flex-col gap-3">
          <div class="flex items-center gap-2"><span class="tag">${post.category}</span><span class="text-dim uppercase text-[12px] font-mono">${post.date}</span></div>
          <div class="flex-1"><h3 class="font-display font-semibold text-text mb-2 text-[18px] leading-snug">${post.title}</h3><p class="text-dim text-[15px] line-clamp-2">${post.description}</p></div>
          <div class="iframe-wrap mb-2"><iframe src="https://www.youtube.com/embed/${post.youtubeId}" allowfullscreen></iframe></div>
          <div class="flex items-center justify-between"><div class="flex gap-1.5 flex-wrap">${post.tags.map(tag => `<span class="tag" style="background:rgba(108,182,255,0.05);">${tag}</span>`).join('')}</div><div class="arrow-btn">→</div></div>
        </article>
      `).join('');
    }

    function renderHotPosts() {
      const hotContainer = document.getElementById('hot-posts-container');
      if (!hotContainer) return;
      hotContainer.innerHTML = posts.slice(0, 4).map((post, i) => `
        <div class="flex gap-3 items-start group cursor-pointer"><span class="font-display text-accentDim group-hover:text-accent shrink-0 text-[22px] leading-none mt-[1px]">0${i+1}</span><span class="text-dim group-hover:text-text text-[15px] leading-snug line-clamp-2">${post.title}</span></div>
      `).join('');
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderArticles(posts);
      renderHotPosts();
      document.querySelectorAll('.nav-filter').forEach(link => {

          if (["首页","机场&VPS","手机&eSIM","银行&券商&交易所","港美股&加密货币","各类工具"].includes(cat)) {

            document.getElementById('main-title').innerText = cat === '首页' ? "最新文章" : cat;
            renderArticles(cat === '首页' ? posts : posts.filter(p => p.category === cat));
            window.scrollTo({top:0, behavior:'smooth'});
          }
        });
      });

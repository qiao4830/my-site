<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>视频说明 - 小帆船数字出海</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Syne:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { background-color: #0b111a; background-image: linear-gradient(rgba(108,182,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(108,182,255,0.04) 1px, transparent 1px); background-size: 40px 40px; color: #e6eef8; font-family: 'Inter', sans-serif; }
    .nav-blur { backdrop-filter: blur(14px); background: rgba(11, 17, 26, 0.84); border-bottom: 1px solid rgba(108,182,255,0.08); }
    .detail-card { background: rgba(20, 28, 39, 0.94); border: 1px solid #243244; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
    .iframe-wrap { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 16px; background: #000; border: 1px solid #2b4667; }
    .iframe-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
    .tag { display: inline-flex; align-items: center; background: rgba(108,182,255,0.10); border: 1px solid rgba(108,182,255,0.18); border-radius: 999px; color: #9fd0ff; font-size: 13px; padding: 5px 12px; }
    .content-text { line-height: 1.8; color: #a4b4c8; font-size: 16px; }
    .btn-back { transition: all 0.3s ease; }
    .btn-back:hover { transform: translateX(-5px); color: #6cb6ff; }
  </style>
</head>
<body class="min-h-screen pb-20">

  <!-- 顶部导航 -->
  <header class="nav-blur sticky top-0 z-50 h-16 flex items-center px-6 md:px-10">
    <a href="index.html" class="btn-back flex items-center gap-2 text-white/80 font-semibold">
      <i class="fas fa-chevron-left"></i> 返回实操列表
    </a>
  </header>

  <main class="max-w-5xl mx-auto px-4 pt-10">
    <div id="content-loader">
        <!-- 初始加载状态 -->
        <div class="animate-pulse flex flex-col gap-6">
            <div class="h-10 bg-surface rounded w-3/4"></div>
            <div class="h-[400px] bg-surface rounded-2xl"></div>
        </div>
    </div>

    <div id="content-area" class="detail-card p-6 md:p-10 hidden">
        <!-- 分类与日期 -->
        <div class="flex items-center justify-between mb-6">
            <div id="post-category" class="tag"></div>
            <div id="post-date" class="text-muted font-mono text-sm"></div>
        </div>

        <!-- 标题 -->
        <h1 id="post-title" class="text-2xl md:text-4xl font-bold mb-8 leading-tight text-white"></h1>

        <!-- 视频容器 -->
        <div class="iframe-wrap mb-10">
            <iframe id="post-video" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>

        <!-- 正文说明 -->
        <div class="space-y-10">
            <section>
                <h2 class="text-xl font-bold text-accent flex items-center gap-2 mb-4">
                    <i class="fas fa-file-alt"></i> 核心说明
                </h2>
                <div id="post-description" class="content-text bg-white/5 p-6 rounded-xl border border-white/5"></div>
            </section>

            <section>
                <h2 class="text-xl font-bold text-accent flex items-center gap-2 mb-4">
                    <i class="fas fa-terminal"></i> 关键标签
                </h2>
                <div id="post-tags" class="flex gap-2 flex-wrap"></div>
            </section>

            <!-- 底部引导 -->
            <footer class="pt-10 border-t border-border mt-16 text-center">
                <p class="text-muted mb-6">如果你觉得这个实操有帮助，欢迎在 YouTube 评论区交流</p>
                <div class="flex justify-center gap-4">
                    <a href="https://t.me/vipxiaofanchuan" target="_blank" class="tag bg-sky-500/10 border-sky-500/20 text-sky-400 py-3 px-6">
                        <i class="fab fa-telegram mr-2"></i> 加入 Telegram 交流群
                    </a>
                </div>
            </footer>
        </div>
    </div>
  </main>

  <!-- 引入数据库 -->
  <script src="data.js"></script>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 1. 获取 URL 中的 ID 参数
      const urlParams = new URLSearchParams(window.location.search);
      const videoId = urlParams.get('id');

      if (!videoId || typeof posts === 'undefined') {
        window.location.href = 'index.html';
        return;
      }

      // 2. 从 data.js 中查找对应的视频数据
      const post = posts.find(p => p.youtubeId === videoId);

      if (post) {
        // 3. 填充内容
        document.title = `${post.title} - 小帆船实操说明`;
        document.getElementById('post-title').innerText = post.title;
        document.getElementById('post-category').innerText = post.category;
        document.getElementById('post-date').innerText = post.date;
        document.getElementById('post-description').innerHTML = post.description || "暂无详细说明，请参考视频内操作演示。";
        document.getElementById('post-video').src = `https://www.youtube.com/embed/${post.youtubeId}?autoplay=1`;
        
        // 渲染标签
        const tagsContainer = document.getElementById('post-tags');
        if (post.tags) {
            tagsContainer.innerHTML = post.tags.map(t => `<span class="tag"># ${t}</span>`).join('');
        }

        // 4. 显示内容区域，隐藏加载器
        document.getElementById('content-loader').classList.add('hidden');
        document.getElementById('content-area').classList.remove('hidden');
      } else {
        document.getElementById('content-loader').innerHTML = `
            <div class="text-center py-20">
                <h2 class="text-2xl font-bold mb-4">⚠️ 视频去远航了</h2>
                <p class="text-dim mb-8">没找到对应的说明页面，请返回首页查看其它内容。</p>
                <a href="index.html" class="tag px-8 py-3 bg-accent text-bg font-bold">返回首页</a>
            </div>
        `;
      }
    });
  </script>
</body>
</html>
